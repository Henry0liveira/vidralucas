<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="kitchenBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#kitchenBg)"/>
  
  <!-- Kitchen counter -->
  <rect x="450" y="280" width="300" height="280" fill="#e8e8e8" stroke="#666" stroke-width="3"/>
  
  <!-- Sink -->
  <ellipse cx="520" cy="350" rx="40" ry="50" fill="#ddd"/>
  <ellipse cx="520" cy="340" rx="35" ry="45" fill="#ccc"/>
  
  <!-- Glass door frame -->
  <rect x="480" y="200" width="200" height="280" rx="5" fill="#e8f4ff" stroke="#333" stroke-width="4"/>
  
  <!-- Glass panes -->
  <line x1="580" y1="200" x2="580" y2="480" stroke="#333" stroke-width="2"/>
  <line x1="480" y1="300" x2="680" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="480" y1="390" x2="680" y2="390" stroke="#333" stroke-width="2"/>
  
  <!-- Glass reflections -->
  <rect x="485" y="205" width="90" height="70" fill="#fff" opacity="0.3"/>
  <rect x="585" y="240" width="85" height="60" fill="#fff" opacity="0.2"/>
  
  <!-- Faucet -->
  <rect x="505" y="150" width="30" height="50" fill="#888"/>
  <circle cx="520" cy="140" r="25" fill="#aaa"/>
  
  <!-- Title -->
  <text x="150" y="70" font-size="42" font-weight="bold" fill="#333" font-family="Arial">
    PORTINHA DE PIA
  </text>
  
  <!-- Subtitle -->
  <text x="150" y="130" font-size="26" fill="#333" font-family="Arial">Designer único</text>
  <text x="150" y="165" font-size="26" fill="#333" font-family="Arial">que dá um toque</text>
  <text x="150" y="200" font-size="26" fill="#333" font-family="Arial">especial ao</text>
  <text x="150" y="235" font-size="26" fill="#333" font-family="Arial">ambiente.</text>
  
  <!-- Benefits -->
  <text x="150" y="300" font-size="24" fill="#333" font-family="Arial">Deixando sua</text>
  <text x="150" y="335" font-size="24" fill="#333" font-family="Arial">cozinha ainda</text>
  <text x="150" y="370" font-size="24" font-weight="bold" fill="#0A6EBD" font-family="Arial">MAIS LINDA!</text>
  
  <!-- Contact section -->
  <rect x="100" y="430" width="600" height="130" rx="15" fill="rgba(107, 163, 184, 0.7)"/>
  
  <!-- Contact title -->
  <text x="400" y="465" font-size="20" text-anchor="middle" fill="#000" font-weight="bold" font-family="Arial">
    Faça seu orçamento
  </text>
  
  <!-- Phone numbers -->
  <text x="400" y="500" font-size="18" text-anchor="middle" fill="#fff" font-family="Arial">
    (12) 98171-1143
  </text>
  <text x="400" y="530" font-size="18" text-anchor="middle" fill="#fff" font-family="Arial">
    (12) 3641-2659
  </text>
</svg>