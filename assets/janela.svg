<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f8ff"/>
  
  <!-- Window frame -->
  <rect x="50" y="80" width="700" height="350" fill="none" stroke="#333" stroke-width="4"/>
  <rect x="50" y="80" width="700" height="350" fill="#e8f4ff" opacity="0.6"/>
  
  <!-- Window panes -->
  <line x1="200" y1="80" x2="200" y2="430" stroke="#333" stroke-width="2"/>
  <line x1="350" y1="80" x2="350" y2="430" stroke="#333" stroke-width="2"/>
  <line x1="500" y1="80" x2="500" y2="430" stroke="#333" stroke-width="2"/>
  <line x1="650" y1="80" x2="650" y2="430" stroke="#333" stroke-width="2"/>
  
  <!-- Horizontal pane lines -->
  <line x1="50" y1="200" x2="750" y2="200" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="320" x2="750" y2="320" stroke="#333" stroke-width="2"/>
  
  <!-- Plant decoration -->
  <circle cx="700" cy="150" r="30" fill="#90ee90"/>
  <line x1="700" y1="180" x2="700" y2="250" stroke="#8B7355" stroke-width="3"/>
  
  <!-- Title -->
  <text x="400" y="470" font-size="32" font-weight="bold" text-anchor="middle" fill="#0A6EBD">
    JANELA 1500X1000H
  </text>
  
  <!-- Specs -->
  <text x="100" y="510" font-size="18" fill="#333">✓ VIDRO INCOLOR 8MM</text>
  <text x="100" y="540" font-size="18" fill="#333">✓ FECHADURA BATE-FECHA</text>
  
  <!-- Price -->
  <rect x="500" y="490" width="250" height="70" rx="20" fill="#6ba3b8"/>
  <text x="625" y="520" font-size="24" font-weight="bold" text-anchor="middle" fill="#000">R$ 730,00</text>
  <text x="625" y="545" font-size="14" text-anchor="middle" fill="#000">Parcelamos em até 6x</text>
</svg>