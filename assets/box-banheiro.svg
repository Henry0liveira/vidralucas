<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Bathroom wall -->
  <rect x="0" y="0" width="400" height="600" fill="#d4a574"/>
  
  <!-- Floor -->
  <path d="M 400 450 L 800 450 L 800 600 L 400 600 Z" fill="#8b7355"/>
  
  <!-- Toilet -->
  <ellipse cx="320" cy="520" rx="50" ry="30" fill="#fff"/>
  <path d="M 270 490 Q 260 450 280 420 L 360 420 Q 380 450 370 490 Z" fill="#fff"/>
  
  <!-- Glass box frame -->
  <rect x="420" y="250" width="350" height="350" rx="10" fill="#e8f6f3" stroke="#000" stroke-width="3"/>
  
  <!-- Glass panes grid -->
  <line x1="470" y1="250" x2="470" y2="600" stroke="#333" stroke-width="2"/>
  <line x1="610" y1="250" x2="610" y2="600" stroke="#333" stroke-width="2"/>
  <line x1="720" y1="250" x2="720" y2="600" stroke="#333" stroke-width="2"/>
  <line x1="420" y1="350" x2="770" y2="350" stroke="#333" stroke-width="2"/>
  <line x1="420" y1="450" x2="770" y2="450" stroke="#333" stroke-width="2"/>
  
  <!-- Glass reflection effect -->
  <rect x="420" y="250" width="350" height="80" opacity="0.3" fill="#fff"/>
  
  <!-- Towel rack -->
  <rect x="380" y="280" width="25" height="150" fill="#333"/>
  <circle cx="392.5" cy="290" r="15" fill="#e8d4c4"/>
  
  <!-- Title -->
  <text x="400" y="50" font-size="28" font-weight="bold" text-anchor="middle" fill="#000">
    BOX DE VIDRO INCOLOR 8MM
  </text>
  
  <!-- Specs -->
  <text x="50" y="100" font-size="16" fill="#333">✓ ALTURA PADRÃO</text>
  <text x="50" y="130" font-size="16" fill="#333">✓ COM MEDIDAS ATÉ 1,30</text>
  
  <!-- Price -->
  <rect x="450" y="100" width="280" height="70" rx="20" fill="#6ba3b8"/>
  <text x="590" y="130" font-size="24" font-weight="bold" text-anchor="middle" fill="#000">R$ 780,00</text>
  <text x="590" y="155" font-size="14" text-anchor="middle" fill="#000">Parcelamos em até 6x</text>
</svg>